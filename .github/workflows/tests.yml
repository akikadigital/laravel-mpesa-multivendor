name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, openssl
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Show versions
        run: |
          php -v
          composer show pestphp/pest || true
          composer show phpunit/phpunit || true
          composer show orchestra/testbench || true

      - name: Run tests
        run: vendor/bin/pest --configuration=phpunit.xml