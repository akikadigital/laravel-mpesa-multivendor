name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3]
        laravel: [10.*, 11.*, 12.*]
        exclude:
          - php: 8.1
            laravel: 11.*
          - php: 8.1
            laravel: 12.*

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, openssl
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" \
                           "orchestra/testbench:^8.0|^9.0|^10.0" \
                           --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

      - name: Run coverage
        if: matrix.php == '8.3' && matrix.laravel == '12.*'
        run: XDEBUG_MODE=coverage vendor/bin/pest --coverage